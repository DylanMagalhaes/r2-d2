        <h1>R2-D2 Coffee &amp; Ice Cream — Machines café et glaces robotisées en France</h1>
        <p>
          R2-D2 Coffee &amp; Ice Cream installe des automates robotisés pour café premium, glaces artisanales
          et Art Latte en France. Les machines peuvent être habillées aux couleurs de votre marque pour lieux premium,
          centres commerciaux, entreprises, restaurants, cafés et événements. Bras robotique KOZA, disponible 24h/24 7j/7.
        </p>

        <section>
          <h2>Deux concepts premium, un même écosystème robotique</h2>
          <h3>R2-D2 Coffee — Café d'excellence</h3>
          <p>
            Espressos, lattés d'art, cold brews et créations signatures — chaque boisson est préparée par notre robot-barista
            avec une précision millimétrée. 100 % Arabica fraîchement moulu, lait frais, mouture à la demande pour chaque tasse.
            Un répertoire infini de recettes chaudes et glacées, pour satisfaire toutes les envies en toute saison.
          </p>
          <h3>R2-D2 Ice Cream — Glaces artisanales</h3>
          <p>
            Glaces artisanales, sundaes gourmets et créations glacées — chaque dessert est dressé en temps réel par notre bras robotisé.
            Possibilités de recettes infinies, pour renouveler la carte au gré des saisons et de votre créativité.
          </p>
          <h3>Technologie R2-D2 — Innovation brevetée</h3>
          <p>
            Notre système robotique breveté assure une constance absolue de la qualité et génère un effet spectaculaire qui transforme
            chaque client en ambassadeur. Machines personnalisables aux couleurs de votre marque : habillage, interface, écrans.
          </p>
        </section>

        <section>
          <h2>Art Latte — Impression sur mousse personnalisée</h2>
          <p>
            Innovation brevetée : logo, photo ou message directement imprimé sur la mousse de vos boissons chaudes en moins de 90 secondes.
            Grâce à la technologie Art Latte de la machine R2-D2 Coffee, vous imprimez en temps réel n'importe quelle photo, selfie,
            logo ou visuel directement sur vos boissons chaudes (cappuccino, latté, chocolat chaud, café gourmand).
          </p>
          <p>
            Idéal pour : événements corporate, mariages, marketing &amp; branding, centres commerciaux, salons professionnels,
            restaurants et cafés. Partageable sur Instagram, TikTok, Snapchat.
          </p>
          <ul>
            <li>Logos d'entreprise sur café</li>
            <li>Selfies instantanés sur mousse</li>
            <li>Messages personnalisés</li>
            <li>Visuels événementiels</li>
            <li>Branding marketing</li>
            <li>Habillage sur-mesure de la machine</li>
          </ul>
        </section>

        <section>
          <h2>Machine R2-D2 Coffee — Automate café KOZA Robotic</h2>
          <p>
            Au cœur du concept, le bras robotique KOZA Robotic opère dans une vitrine transparente — spectacle et précision, 24h/24.
            La machine R2-D2 Coffee incarne la robotique au service de l'art du café : autonomie, constance et mise en scène pour chaque client.
          </p>
          <ul>
            <li>100 % Arabica fraîchement moulu — grains premium, lait frais, mouture à la demande</li>
            <li>Bras robotique haute précision — préparation automatisée, constance absolue, zéro intervention humaine</li>
            <li>Hygiène &amp; maintenance automatique — cycles de nettoyage, enceinte hermétique</li>
            <li>Interface tactile &amp; paiement — écran HD, Apple Pay, Google Pay, carte bancaire</li>
          </ul>
        </section>

        <section>
          <h2>Habillage marque — Vos couleurs, votre signature</h2>
          <p>
            Les automates R2-D2 peuvent être habillés aux couleurs de votre marque : finitions, signalétique et parcours visuel
            s'alignent sur votre charte graphique — idéal pour retail, corporate ou activation événementielle.
          </p>
          <ul>
            <li>Charte &amp; couleurs — habillage des panneaux et zones visibles selon votre palette graphique</li>
            <li>Écrans &amp; contenus — personnalisation des écrans de commande avec vos logos et visuels d'accueil</li>
            <li>Scénographie lieu — stand, corner ou espace événementiel co-brandé R2-D2 × votre univers</li>
          </ul>
        </section>

        <section>
          <h2>Partenariat — Déployez R2-D2 avec nous</h2>
          <p>
            Nous accompagnons opérateurs, lieux premium et équipes événementielles : mise en œuvre terrain, transfert de compétences
            et suivi après installation — sans modèle franchise. Formation, livraison clé en main, support continu 7j/7.
          </p>
          <p>
            Déploiement possible dans centres commerciaux, bureaux et espaces corporate, salons professionnels, hôtels et hospitality,
            restaurants, cafés, événements temporaires ou permanents.
          </p>
        </section>

        <section>
          <h2>Questions fréquentes — Machine café robotisée R2-D2</h2>
          <dl>
            <dt><strong>Pour quels types de lieux peut-on installer R2-D2 ?</strong></dt>
            <dd>Centres commerciaux, bureaux &amp; corporate, salons, hospitality, événements temporaires ou permanents. Chaque dossier précise circulation, dimensions, raccords et exposition souhaitée.</dd>
            <dt><strong>L'automate peut-il reprendre intégralement notre charte graphique ?</strong></dt>
            <dd>Oui — habillage mécanique, couleurs, habillages façade et adaptations d'interfaces sont étudiées selon vos codes. Un cahier des charges et validations techniques précèdent toute fabrication spécifique.</dd>
            <dt><strong>Quels sont les délais usuels jusqu'à la mise en service ?</strong></dt>
            <dd>Ils dépendent du niveau de personnalisation, des délais de fabrication et du chantier sur site. Une fourchette indicative vous est donnée après expression de besoin.</dd>
            <dt><strong>Comment fonctionne le modèle commercial ?</strong></dt>
            <dd>Achat, location ou autres modalités peuvent être proposées selon votre projet — sans modèle franchise standardisé. Les conditions sont précisées en devis après qualification du besoin.</dd>
            <dt><strong>Quel accompagnement après l'installation ?</strong></dt>
            <dd>Hotline technique, mise à jour des contenus médias lorsque c'est prévu, et repères pour l'animation du point de vente. Le périmètre exact figure au contrat de déploiement.</dd>
          </dl>
